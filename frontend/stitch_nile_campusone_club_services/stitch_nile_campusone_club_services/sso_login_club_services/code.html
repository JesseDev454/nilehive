<body class="h-full flex items-center justify-center p-gutter bg-surface">

<div class="bg-surface-container-lowest border-[3px] border-primary rounded-[24px] p-container-padding neo-shadow flex flex-col gap-6 relative">

<div class="absolute -top-4 -left-4 bg-tertiary-fixed border-[3px] border-primary rounded-full px-4 py-1 neo-shadow flex items-center gap-2 transform -rotate-6">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="font-label-bold text-label-bold text-primary">Nile SSO</span>
</div>
<!-- Header -->
<div class="text-center mt-6">
<div class="w-16 h-16 bg-primary-fixed border-[3px] border-primary rounded-full mx-auto mb-4 flex items-center justify-center neo-shadow">
<span class="material-symbols-outlined text-primary text-3xl">waving_hand</span>
</div>
<h1 class="font-display text-display text-primary mb-2 tracking-tighter">Welcome Back.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Sign in with your Nile University account</p>
</div>
<hr class="border-t-[3px] border-primary-fixed my-2"/>

<div class="bg-surface-container-low border-[3px] border-primary rounded-xl p-4 neo-shadow relative">
<div class="absolute -right-3 -top-3 w-8 h-8 bg-secondary-container border-[3px] border-primary rounded-full flex items-center justify-center neo-shadow">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary mb-2">Single Sign-On</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-0">Use your Nile University CampusOne account. No separate password needed.</p>
</div>
<!-- Action Button -->
<div class="mt-4">
<button class="w-full bg-on-primary border-[3px] border-primary rounded-xl py-4 px-6 flex items-center justify-center gap-3 neo-shadow neo-shadow-hover transition-all group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">login</span>
<span class="font-headline-md text-headline-md text-primary tracking-tighter">Sign in with CampusOne</span>
</button>
</div>
<!-- Help text -->
<div class="text-center mt-2">
<a class="font-label-bold text-label-bold text-primary hover:text-secondary-fixed transition-colors underline decoration-2 underline-offset-4" href="#">Need help signing in?</a>
</div>
</div>
