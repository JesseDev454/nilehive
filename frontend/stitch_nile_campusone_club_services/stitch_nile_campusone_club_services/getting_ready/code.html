<!-- Quest Progress Bar -->

</div>
</div>
<!-- Decorative element -->

<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="w-2 h-2 rounded-full bg-primary animate-pulse" style="animation-delay: 150ms;"></span>
<span class="w-2 h-2 rounded-full bg-primary animate-pulse" style="animation-delay: 300ms;"></span>
</div>

<!-- JavaScript for Loading Simulation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressFill = document.getElementById('progress-fill');
            const microcopy = document.getElementById('loading-microcopy');
            
            const stages = [
                { progress: 20, text: "Verifying student ID..." },
                { progress: 45, text: "Unlocking club access..." },
                { progress: 70, text: "Syncing academic calendar..." },
                { progress: 90, text: "Generating quest log..." },
                { progress: 100, text: "Ready for adventure!" }
            ];

            let currentStage = 0;

            const interval = setInterval(() => {
                if (currentStage < stages.length) {
                    const stage = stages[currentStage];
                    progressFill.style.width = `${stage.progress}%`;
                    
                    // Fade text out/in
                    microcopy.style.opacity = '0';
                    setTimeout(() => {
                        microcopy.innerText = stage.text;
                        microcopy.style.opacity = '1';
                        
                        // Add a little pop effect to the progress bar on completion
                        if(stage.progress === 100) {
                            progressFill.classList.add('bg-secondary-fixed');
                            setTimeout(() => {
                                // Simulate redirect (in a real app)
                                console.log("Redirecting to dashboard...");
                            }, 500);
                        }
                    }, 200);

                    currentStage++;
                } else {
                    clearInterval(interval);
                }
            }, 1200); // Wait 1.2s between simulated stages
            
            // Add a smooth transition to the text opacity
            microcopy.style.transition = 'opacity 0.2s ease-in-out';
        });
    </script>
